<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rondes</title>
</head>
<body>

    <section aria-labelledby="Get-Rondes-title">
      <h2 id="Get-Rondes-title">GET alle Rondes</h2>
      <div class="Get-Rondes">
        <button id="load-rondes">Laad Rondes</button>
        <input id="search" type="search" placeholder="Zoek op naam..." />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>

  <section aria-labelledby="Post-Rondes-title">
      <h2 id="Post-Rondes-title">Voeg een Rondes toe</h2>
      <div class="Post-Rondes">
        <button id="add-ronde">voeg toe</button>
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <input id="ronde_nummer" type="number" placeholder="Geef een Ronde Nummer" />
        <input id="ronde_id" type="number" placeholder="Geef een Ronde ID" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>

     <section aria-labelledby="Post-Rondes-title">
      <h2 id="Delete-Rondes-title">Verwijder een Rondes</h2>
      <div class="Delete-Rondes">
        <button id="delete-ronde">verwijder ronde</button>
        <input id="ronde_id" type="number" placeholder="Geef een Ronde ID" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>

     <section aria-labelledby="Put-Rondes-title">
      <h2 id="Put-Rondes-title">Update een Rondes</h2>
      <div class="Put-Rondes">
        <button id="update-ronde">update ronde</button>
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <input id="ronde_nummer" type="number" placeholder="Geef een Ronde Nummer" />
        <input id="ronde_id" type="number" placeholder="Geef een Ronde ID" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
    <script src="ronde.js"></script>
    <link rel="stylesheet" href="styles.css" />
    
    </main>
</body>
</html>
