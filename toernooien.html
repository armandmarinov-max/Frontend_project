<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toernooien</title>
</head>
<body>
    
    <section aria-labelledby="Get-Toernooien-title">
      <h2 id="Get-Toernooien-title">GET alle Toernooien</h2>
      <div class="Get-Toernooien">
        <button id="load-toernooien">Laad Toernooien</button>
        <input id="search" type="search" placeholder="Zoek op naam..." />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
  
    <section aria-labelledby="Post-Toernooi-title">
      <h2 id="Post-Toernooi-title">Voeg een Toernooi toe</h2>
      <div class="Post-Toernooi">
        <button id="add-toernooi">voeg toe</button>
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <input id="naam" type="text" placeholder="Geef een Naam" />
        <input id="locatie" type="text" placeholder="Geef een Locatie" />
        <input id="start_datum" type="date" placeholder="Geef een Start Datum" />
        <input id="eind_datum" type="date" placeholder="Geef een Eind Datum" />
        <input id="timecontrol" type="text" placeholder="Geef een Timecontrol" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
   
    <section aria-labelledby="Delete-Toernooi-title">
      <h2 id="Delete-Toernooi-title">Verwijder een Toernooi</h2>
      <div class="Delete-Toernooi">
        <button id="delete-toernooi">verwijder toernooi</button>
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
   
     <section aria-labelledby="Put-Toernooi-title">
      <h2 id="Put-Toernooi-title">Update een Toernooi</h2>
      <div class="Put-Toernooi">
        <button id="update-toernooi">update toernooi</button>
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <input id="naam" type="text" placeholder="Geef een Naam" />
        <input id="locatie" type="text" placeholder="Geef een Locatie" />
        <input id="start_datum" type="date" placeholder="Geef een Start Datum" />
        <input id="eind_datum" type="date" placeholder="Geef een Eind Datum" />
        <input id="timecontrol" type="text" placeholder="Geef een Timecontrol" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </main>
</body>
      <script src="toernooien.js"></script>
      <link rel="stylesheet" href="styles.css" />
    </main>
</body>
</html>
