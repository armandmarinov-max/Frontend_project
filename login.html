<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Schaaktoernooien</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #0d1117);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #111827;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .logo h1 {
            font-weight: 600;
            font-size: 28px;
        }

        .logo p {
            font-size: 14px;
            color: #9ca3af;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            color: #d1d5db;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #020617;
            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #6366f1;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .links {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
        }

        .links a {
            color: #818cf8;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <h1>♟ SchaakToernooien</h1>
            <p>Log in om je toernooien te beheren</p>
        </div>

        <form>
            <div class="form-group">
                <label for="email">E-mailadres</label>
                <input type="email" id="email" placeholder="bijv. naam@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" placeholder="Voer je wachtwoord in" required>
            </div>

            <button type="submit" class="btn">Inloggen</button>
        </form>

        <div class="links">
            <p>Geen account? <a href="#">Registreer hier</a></p>
            <p><a href="#">Wachtwoord vergeten?</a></p>
        </div>

        <div class="footer">
            <p>© 2026 SchaakToernooien - Alle rechten voorbehouden</p>
        </div>
    </div>

</body>
</html>
