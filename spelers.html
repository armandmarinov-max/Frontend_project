<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelers</title>
</head>
<body>
    //Hier komt de button en zoek functie voor spelers
    <section aria-labelledby="Get-Spelers-title">
      <h2 id="Get-Spelers-title">GET alle Spelers</h2>
      <div class="Get-Spelers">
        <button id="load-spelers">Laad Spelers</button>
        <input id="search" type="search" placeholder="Zoek op naam..." />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
    // hier komt buttons om een speler toe te voegen.
    <section aria-labelledby="Post-Spelers-title">
      <h2 id="Post-Spelers-title">GET alle Spelers</h2>
      <div class="Get-Spelers">
        <button id="load-spelers">Laad Spelers</button>
        <input id="search" type="search" placeholder="Zoek op naam..." />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
    <script src="spelers.js"></script>

  </main>
</body>
</html>
