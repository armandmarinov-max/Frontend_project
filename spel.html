<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spel</title>
</head>
<body>

    <section aria-labelledby="Get-Spel-title">
      <h2 id="Get-Spel-title">GET alle Spel</h2>
      <div class="Get-Spel">
        <button id="load-spel">Laad Spel</button>
        <input id="search" type="search" placeholder="Zoek op naam..." />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>

    <section aria-labelledby="Post-Spel-title">
      <h2 id="Post-Spel-title">Voeg een Spel toe</h2>
      <div class="Post-Spel">
        <button id="add-spel">voeg toe</button>
        <input id="spel_id" type="number" placeholder="Geef een Spel ID" />
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <input id="ronde_id" type="number" placeholder="Geef een Ronde ID" />
        <input id="White_speler" type="text" placeholder="Geef naam van de white speler" />
        <input id="Black_speler" type="text" placeholder="Geef naam van de black speler" />
        <input id="resultaat" type="number" placeholder="Geef het resultaat" />
        <input id="schaakbordnummer" type="number" placeholder="Geef het schaakbordnummer" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
  
    <section aria-labelledby="Delete-Spel-title">
      <h2 id="Delete-Spel-title">Verwijder een Spel</h2>
      <div class="Delete-Spel">
        <button id="delete-spel">verwijder spel</button>
        <input id="spel_id" type="number" placeholder="Geef een Spel ID" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
    <script src="spel.js"></script>
   
     <section aria-labelledby="Put-Spel-title">
      <h2 id="Put-Spel-title">Update een Spel</h2>
      <div class="Put-Spel">
        <button id="update-spel">update spel</button>
        <input id="spel_id" type="number" placeholder="Geef een Spel ID" />
        <input id="toernooi_id" type="number" placeholder="Geef een Toernooi ID" />
        <input id="ronde_id" type="number" placeholder="Geef een Ronde ID" />
        <input id="White_speler" type="text" placeholder="Geef naam van de white speler" />
        <input id="Black_speler" type="text" placeholder="Geef naam van de black speler" />
        <input id="resultaat" type="number" placeholder="Geef het resultaat" />
        <input id="schaakbordnummer" type="number" placeholder="Geef het schaakbordnummer" />
        <span id="status" role="status" aria-live="polite"></span>
      </div>
      <div id="results" class="grid" aria-live="polite"></div>
    </section>
    <link rel="stylesheet" href="styles.css" />

    </main>
</body>
</html>
